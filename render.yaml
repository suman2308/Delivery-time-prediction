services:
  - type: web
    name: smart-delivery-prediction
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    autoDeploy: true
    envVars:
      - key: DELIVERY_DB_PATH
        value: /var/data/delivery.db
      - key: DELIVERY_MODEL_PATH
        value: /var/data/models/delivery_regressor.joblib
      - key: BOOTSTRAP_ON_START
        value: "1"
      - key: BOOTSTRAP_SEED_COUNT
        value: "300"
    disk:
      name: delivery-data
      mountPath: /var/data
      sizeGB: 1
